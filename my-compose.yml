services:
  db:
    image: mysql:8.0
    container_name: my_mysql
    env_file:
      - ./db.env
    volumes:
      - ./trainee_backend/schema_script.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
        - backend_network
  
  backend:
    build:
      context: ./trainee_backend
      dockerfile: trainee_backend.Dockerfile
    container_name: my_backend
    env_file:
      - ./trainee_backend/.env
    networks:
        - backend_network
    depends_on:
      - db
  
  frontend:
    build:
      context: ./trainee_frontend
      dockerfile: trainee_frontend.Dockerfile
    container_name: my_frontend
    env_file:
      - ./trainee_frontend/.env
    networks:
         - frontend_network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
        - backend_network
        - frontend_network

        
networks:
  backend_network:
  frontend_network:
